<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <style>
    .text { font: 13px/1.2 Arial, Helvetica, sans-serif; fill: #1f2937; }
    .title { font: 18px/1.2 Arial, Helvetica, sans-serif; font-weight: bold; }
    .component { fill: #fff; stroke: #111827; stroke-width: 1.2px; }
    .pin { fill: #111827; }
    .wire-red { stroke: #e11d48; stroke-width: 3px; }
    .wire-black { stroke: #111827; stroke-width: 3px; }
    .wire-green { stroke: #16a34a; stroke-width: 3px; }
    .wire-blue { stroke: #0ea5e9; stroke-width: 3px; }
    .note { font-size:12px; fill: #374151 }
  </style>

  <text x="24" y="28" class="title">Wiring Diagram — Breadboard View</text>

  <!-- Breadboard rectangle -->
  <rect x="20" y="50" width="760" height="280" rx="6" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="40" y="72" class="text">Breadboard (top view)</text>

  <!-- Power rails -->
  <rect x="40" y="90" width="720" height="18" fill="#fff5f5" stroke="#fecaca" />
  <text x="64" y="104" class="text">+ (VCC)</text>
  <rect x="40" y="110" width="720" height="18" fill="#f1f5f9" stroke="#cbd5e1" />
  <text x="64" y="124" class="text">- (GND)</text>

  <!-- Arduino Uno (simplified) -->
  <rect x="820" y="60" width="340" height="240" rx="8" class="component" />
  <text x="990" y="82" class="text">Arduino Uno</text>
  <text x="860" y="108" class="text">D2</text>
  <line x1="885" y1="110" x2="760" y2="160" class="wire-blue" />
  <text x="860" y="132" class="text">D3</text>
  <line x1="885" y1="134" x2="400" y2="190" class="wire-green" />
  <text x="860" y="156" class="text">D4</text>
  <line x1="885" y1="158" x2="420" y2="220" class="wire-red" />
  <text x="860" y="180" class="text">D5</text>
  <line x1="885" y1="182" x2="420" y2="250" class="wire-red" />
  <text x="860" y="204" class="text">D6</text>
  <line x1="885" y1="206" x2="520" y2="240" class="wire-blue" />
  <text x="1000" y="108" class="text">TX0/RX0 (Serial)</text>
  <text x="1000" y="128" class="note">(use SoftwareSerial on Uno: pins D7/D8 in this project)</text>

  <!-- MQ-2 module -->
  <rect x="60" y="170" width="140" height="80" rx="6" class="component" />
  <text x="130" y="188" class="text">MQ-2</text>
  <text x="92" y="210" class="text">VCC</text>
  <text x="92" y="228" class="text">GND</text>
  <text x="92" y="246" class="text">DATA -> D2</text>
  <line x1="140" y1="246" x2="760" y2="170" class="wire-blue" />

  <!-- Flame sensor -->
  <rect x="60" y="270" width="140" height="70" rx="6" class="component" />
  <text x="130" y="288" class="text">Flame Sensor</text>
  <text x="92" y="310" class="text">VCC</text>
  <text x="92" y="328" class="text">GND</text>
  <text x="92" y="346" class="text">DATA -> D6</text>
  <line x1="140" y1="346" x2="520" y2="246" class="wire-blue" />

  <!-- LEDs and resistors cluster -->
  <rect x="260" y="190" width="110" height="150" rx="6" class="component" />
  <text x="310" y="210" class="text">LEDs & Buzzer</text>
  <text x="300" y="232" class="text">Green LED -> D3 (with 220Ω)</text>
  <text x="300" y="252" class="text">Buzzer -> D4</text>
  <text x="300" y="272" class="text">Red LED -> D5 (with 220Ω)</text>
  <line x1="300" y1="238" x2="885" y2="134" class="wire-green" />
  <line x1="300" y1="252" x2="885" y2="158" class="wire-red" />
  <line x1="300" y1="272" x2="885" y2="182" class="wire-red" />

  <!-- GSM module -->
  <rect x="820" y="320" width="340" height="200" rx="8" class="component" />
  <text x="990" y="342" class="text">GSM Module (SIM800L / SIM900)</text>
  <text x="860" y="370" class="text">TX -> D7 (SoftwareSerial RX)</text>
  <text x="860" y="392" class="text">RX -> D8 (SoftwareSerial TX)</text>
  <text x="860" y="414" class="text">VCC -> External 4V supply</text>
  <text x="860" y="436" class="text">GND -> Common GND</text>
  <line x1="760" y1="415" x2="820" y2="415" class="wire-black" />

  <!-- GSM serial wires to breadboard pins (representative) -->
  <line x1="760" y1="220" x2="920" y2="350" class="wire-black" />
  <line x1="760" y1="245" x2="940" y2="365" class="wire-black" />

  <!-- GND connections to breadboard -->
  <line x1="520" y1="305" x2="200" y2="330" class="wire-black" />
  <line x1="520" y1="305" x2="140" y2="300" class="wire-black" />

  <!-- Notes -->
  <rect x="24" y="360" width="1136" height="280" rx="6" fill="#ffffff" stroke="#e5e7eb" />
  <text x="48" y="388" class="title">Notes & Recommendations</text>
  <text x="48" y="412" class="note">- Use a dedicated power supply for the GSM module (capable of 1A+ peaks). Do not rely on the Arduino 5V regulator.</text>
  <text x="48" y="432" class="note">- Common ground: connect GSM ground and Arduino ground together.</text>
  <text x="48" y="452" class="note">- Place 220Ω resistors in series with the LEDs. Use the buzzer recommended wiring per its datasheet.</text>
  <text x="48" y="472" class="note">- If using SoftwareSerial on Uno: configure pins D7 (RX) and D8 (TX) as shown in the code.</text>
  <text x="48" y="492" class="note">- Verify SIM card activation and signal; test AT command responses before relying on SMS alerts.</text>

</svg>
